services:
  app:
    build: .
    container_name: banner-futebol
    restart: unless-stopped
    expose:
      - '3000'
    env_file:
      - .env.local
    volumes:
      - ./public/banners:/app/public/banners
      - ./public/assets:/app/public/assets
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - banner-net
      - traefik_default
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.banner.rule=Host(`bannerinforlozzi.alfplaytv.shop`)"
      - "traefik.http.routers.banner.entrypoints=websecure"
      - "traefik.http.routers.banner.tls.certresolver=letsencrypt"
      - "traefik.http.services.banner.loadbalancer.server.port=3000"
      - "traefik.docker.network=traefik_default"

  cron:
    build: .
    container_name: banner-cron
    command: npx tsx src/scripts/cron.ts
    restart: unless-stopped
    env_file:
      - .env.local
    volumes:
      - ./public/banners:/app/public/banners
      - ./public/assets:/app/public/assets
    environment:
      - TZ=America/Sao_Paulo
    networks:
      - banner-net

networks:
  banner-net:
    driver: bridge
  traefik_default:
    external: true
